{% extends 'base.html' %}

{% block content %}
<h1>{% if is_edit %}Редактирование отзыва{% else %}Добавление отзыва{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Сохранить</button>
    <a href="{% url 'bookings:reviews' %}" class="btn">Отмена</a>
</form>
{% endblock %}
